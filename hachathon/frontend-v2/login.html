<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Trackify AI</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .auth-box {
      width: 100%;
      max-width: 400px;
      padding: 3rem;
      text-align: center;
    }
    .input-group {
      margin-bottom: 1.5rem;
      text-align: left;
    }
    .input-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--text-secondary);
      font-size: 0.9rem;
      font-weight: 500;
    }
    .auth-input {
      width: 100%;
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      padding: 0.75rem 1rem;
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      outline: none;
      transition: var(--transition);
      font-size: 1rem;
    }
    .auth-input:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 2px var(--accent-glow);
    }
    .auth-divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 2rem 0;
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    .auth-divider::before, .auth-divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border-color);
    }
    .auth-divider::before { margin-right: .5em; }
    .auth-divider::after { margin-left: .5em; }
  </style>
</head>
<body data-theme="light">

  <div class="mesh-bg"></div>

  <nav class="navbar" style="border-bottom: 1px solid var(--border-color); background: var(--bg-nav);">
    <a href="index.html" class="nav-brand">
      <i data-lucide="crosshair" class="text-gradient-primary"></i>
      <span>Trackify<span style="font-weight: 300;">AI</span></span>
    </a>
    <div style="display: flex; align-items: center; gap: 1rem;">
      <button id="themeToggle" class="theme-toggle">
        <i data-lucide="sun" width="18"></i>
      </button>
    </div>
  </nav>

  <div class="auth-container fade-up">
    <div class="glass-panel auth-box">
      <div style="margin-bottom: 2rem;">
        <i data-lucide="crosshair" class="text-gradient-primary" style="width: 48px; height: 48px; margin-bottom: 1rem;"></i>
        <h2>Welcome back</h2>
        <p class="text-secondary mt-2">Log in to your Trackify AI account</p>
      </div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="input-group">
          <label for="email">Email address</label>
          <input type="email" id="email" class="auth-input" required placeholder="name@company.com">
        </div>
        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="auth-input" required placeholder="••••••••">
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; font-size: 0.85rem;">
          <label style="display: flex; align-items: center; gap: 0.5rem; color: var(--text-secondary); cursor: pointer;">
            <input type="checkbox"> Remember me
          </label>
          <a href="#" style="color: var(--accent-primary);">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
      </form>

      <div class="auth-divider">OR</div>

      <button class="btn btn-secondary" style="width: 100%; margin-bottom: 1.5rem;">
        <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/><path d="M1 1h22v22H1z" fill="none"/></svg>
        Continue with Google
      </button>

      <p class="text-secondary" style="font-size: 0.9rem;">
        Don't have an account? <a href="register.html" style="color: var(--text-primary); font-weight: 500;">Sign up</a>
      </p>
    </div>
  </div>

  <script>
    lucide.createIcons();
    
    // Auto-detect theme from local storage
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.body.setAttribute('data-theme', savedTheme);
  </script>
  <script src="app.js"></script>
</body>
</html>
