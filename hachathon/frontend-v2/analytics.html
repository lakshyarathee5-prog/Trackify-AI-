<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics - Trackify AI</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .chart-container {
      width: 100%;
      height: 350px;
      position: relative;
    }
  </style>
</head>
<body data-theme="light">

  <div id="loader">
    <div class="spinner"></div>
  </div>

  <nav class="navbar" style="background: var(--bg-surface); border-bottom: 1px solid var(--border-color);">
    <div class="nav-brand">
      <i data-lucide="crosshair" class="text-gradient-primary"></i>
      <span>Trackify<span style="font-weight: 300;">AI</span></span>
    </div>
    <div class="search-wrapper">
      <i data-lucide="search" width="18"></i>
      <input type="text" class="search-input" placeholder="Search products, brands, or paste URL...">
    </div>
    <div style="display: flex; align-items: center; gap: 1rem;">
      <button id="themeToggle" class="theme-toggle">
        <i data-lucide="sun" width="18"></i>
      </button>
      <div class="glass-panel" style="padding: 0.5rem; border-radius: 50%; display: flex;">
        <i data-lucide="bell" width="20"></i>
      </div>
      <div class="glass-panel" style="padding: 0.5rem; border-radius: 50%; display: flex; cursor: pointer;" onclick="handleLogout()" title="Logout">
        <i data-lucide="log-out" width="20"></i>
      </div>
    </div>
  </nav>

  <div class="app-layout">
    <aside class="sidebar">
      <div style="display: flex; flex-direction: column; gap: 0.5rem;">
        <a href="dashboard.html" class="btn btn-secondary" style="justify-content: flex-start; padding: 0.6rem 1rem; border: none; background: transparent; width: 100%;">
          <i data-lucide="layout-dashboard" width="18"></i> Dashboard
        </a>
        <a href="tracking.html" class="btn btn-secondary" style="justify-content: flex-start; padding: 0.6rem 1rem; border: none; background: transparent; width: 100%;">
          <i data-lucide="target" width="18"></i> Active Tracks
        </a>
        <a href="analytics.html" class="btn btn-secondary" style="justify-content: flex-start; padding: 0.6rem 1rem; border: none; background: transparent; width: 100%;">
          <i data-lucide="bar-chart-2" width="18"></i> Analytics
        </a>
        <a href="pricing.html" class="btn btn-secondary" style="justify-content: flex-start; padding: 0.6rem 1rem; border: none; background: transparent; width: 100%;">
          <i data-lucide="credit-card" width="18"></i> Subscription
        </a>
      </div>
    </aside>

    <main class="main-content">
      <header class="fade-up" style="margin-bottom: 2rem;">
        <h1 class="mb-2">Price History Analytics</h1>
        <p class="text-secondary">Analyze trends and compare global pricing.</p>
      </header>

      <div class="grid grid-cols-3 gap-6 mb-8">
        <div class="glass-panel feature-card fade-up" style="padding: 1.5rem;">
          <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; color: var(--text-secondary);">
            <i data-lucide="trending-down" width="18"></i> Average Drop
          </div>
          <h2 style="font-size: 2.5rem; font-family: 'Outfit';">14.2%</h2>
          <p style="color: var(--accent-success); font-size: 0.85rem; margin-top: 0.5rem; font-weight: 500;">+2.4% better than last month</p>
        </div>
        <div class="glass-panel feature-card fade-up" style="padding: 1.5rem; transition-delay: 100ms;">
          <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; color: var(--text-secondary);">
            <i data-lucide="target" width="18"></i> Target Hits
          </div>
          <h2 style="font-size: 2.5rem; font-family: 'Outfit';">38</h2>
          <p style="color: var(--accent-success); font-size: 0.85rem; margin-top: 0.5rem; font-weight: 500;">Items reached target price</p>
        </div>
        <div class="glass-panel feature-card fade-up" style="padding: 1.5rem; transition-delay: 200ms;">
          <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; color: var(--text-secondary);">
            <i data-lucide="brain" width="18"></i> AI Accuracy
          </div>
          <h2 style="font-size: 2.5rem; font-family: 'Outfit';">94.8%</h2>
          <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 0.5rem; font-weight: 500;">Based on prediction models</p>
        </div>
      </div>

      <div class="glass-panel fade-up" style="padding: 2rem;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
          <h3 style="font-size: 1.25rem;">Sony WH-1000XM5 Price Trend</h3>
          <select class="btn btn-secondary" style="padding: 0.5rem 1rem; border-radius: 8px; outline: none; appearance: none; cursor: pointer; min-width: 150px; font-size: 0.9rem;">
            <option>Last 30 Days</option>
            <option>Last 6 Months</option>
            <option>Last 1 Year</option>
          </select>
        </div>
        <div class="chart-container">
          <canvas id="priceChart"></canvas>
        </div>
      </div>
    </main>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script>lucide.createIcons();</script>
  <script src="app.js"></script>
</body>
</html>
